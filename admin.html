<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản trị Dữ liệu</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ed573; --danger: #ff4757; --dark: #2f3542; --purple: #6c5ce7; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .pin-display { font-size: 30px; letter-spacing: 15px; margin: 20px 0; text-align: center; color: var(--dark); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 250px; margin: auto; }
        .key { background: #eee; border: none; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 50%; cursor: pointer; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; margin: auto; }
        .setup-box { background: #fff5e6; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ffeaa7; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; }
        .btn-purple { background: var(--purple); box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; }
        .status-bar { padding: 12px; border-radius: 8px; background: #e8f5e9; color: #2e7d32; text-align: center; margin-bottom: 15px; font-size: 14px; display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
    </style>
</head>
<body>

<div id="lockScreen" class="container">
    <h2 style="text-align:center">Nhập mã PIN</h2>
    <div class="pin-display" id="pinDisplay">****</div>
    <div class="keypad">
        <button class="key" onclick="pressKey('1')">1</button><button class="key" onclick="pressKey('2')">2</button><button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button><button class="key" onclick="pressKey('5')">5</button><button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button><button class="key" onclick="pressKey('8')">8</button><button class="key" onclick="pressKey('9')">9</button>
        <button class="key" style="background:#ff7675" onclick="pressKey('C')">C</button><button class="key" onclick="pressKey('0')">0</button>
        <button class="key" style="background:var(--success); color:white" onclick="checkPin()">✔</button>
    </div>
</div>

<div id="adminContent" class="container hidden">
    <div class="setup-box">
        <input type="password" id="gitToken" placeholder="GitHub Token (ghp_...)" onchange="saveConf()">
        <input type="text" id="repoPath" placeholder="username/repository" onchange="saveConf()">
    </div>

    <div id="statusMsg" class="status-bar"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
        <h3 style="margin:0">Danh sách</h3>
        <button onclick="openModal()" style="background:var(--success); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold">+ Thêm mới</button>
    </div>

    <table><tbody id="tbody"></tbody></table>
    
    <button class="btn btn-purple" style="margin-top:20px" onclick="pushGit()">🚀 CẬP NHẬT LÊN GITHUB</button>
</div>

<div id="userModal" class="modal hidden">
    <div class="modal-content">
        <h3>Thông tin</h3>
        <input type="text" id="fTen" placeholder="Họ và tên">
        <input type="text" id="fNgay" placeholder="Ngày sinh (05/06/2014)">
        <input type="text" id="fNghe" placeholder="Nghề nghiệp">
        <input type="text" id="fTruong" placeholder="Trường">
        <input type="text" id="fThich" placeholder="Sở thích">
        <input type="text" id="fBietDanh" placeholder="Biệt danh">
        <div style="display:flex; gap:10px">
            <button class="btn" style="background:var(--success)" onclick="saveUser()">XÁC NHẬN</button>
            <button class="btn" style="background:#636e72" onclick="closeModal()">HỦY</button>
        </div>
    </div>
</div>

<script>
    let pinInput = "";
    const CORRECT_PIN = "0904";
    let userData = [];
    let editIdx = -1;

    function pressKey(num) {
        if(num === 'C') pinInput = ""; else if(pinInput.length < 4) pinInput += num;
        document.getElementById('pinDisplay').innerText = "*".repeat(pinInput.length) || "****";
        if(pinInput.length === 4) setTimeout(checkPin, 300);
    }

    function checkPin() {
        if(pinInput === CORRECT_PIN) {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
            document.getElementById('gitToken').value = localStorage.getItem('gh_token') || '';
            document.getElementById('repoPath').value = localStorage.getItem('gh_repo') || '';
            autoFetchData();
        } else { alert("Sai mã PIN!"); pinInput = ""; document.getElementById('pinDisplay').innerText = "****"; }
    }

    async function autoFetchData() {
        const status = document.getElementById('statusMsg');
        status.style.display = "block"; status.innerText = "⏳ Đang kết nối...";
        try {
            const res = await fetch(`info.js?t=${Date.now()}`);
            const text = await res.text();
            // Xử lý thông minh: tìm đoạn chứa mảng [ ... ]
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            if (start !== -1 && end !== -1) {
                const jsonStr = text.substring(start, end + 1)
                    .replace(/([a-zA-Z0-9_]+):/g, '"$1":') // Thêm ngoặc kép cho key
                    .replace(/'/g, '"') // Đổi ngoặc đơn thành kép
                    .replace(/,(\s*[\}\]])/g, '$1'); // Xóa dấu phẩy thừa
                userData = JSON.parse(jsonStr);
                render();
                status.innerText = "✅ Kết nối thành công!";
            } else { throw new Error(); }
        } catch(e) {
            status.innerText = "⚠️ File info.js đang trống hoặc lỗi.";
            status.style.background = "#fff3e0";
        }
    }

    function render() {
        document.getElementById('tbody').innerHTML = userData.map((u, i) => `
            <tr>
                <td><b>${u.ten}</b><br><small>${u.ngheNghiep}</small></td>
                <td style="text-align:right">
                    <button onclick="openEdit(${i})" style="border:none; background:#f1c40f; color:white; padding:5px 10px; border-radius:5px">Sửa</button>
                    <button onclick="handleDel(${i})" style="border:none; background:#e74c3c; color:white; padding:5px 10px; border-radius:5px; margin-left:5px">Xóa</button>
                </td>
            </tr>
        `).join('');
    }

    function saveConf() {
        localStorage.setItem('gh_token', document.getElementById('gitToken').value.trim());
        localStorage.setItem('gh_repo', document.getElementById('repoPath').value.trim());
    }

    function openModal() { editIdx = -1; clearForm(); document.getElementById('userModal').classList.remove('hidden'); }
    function openEdit(i) {
        editIdx = i; const u = userData[i];
        document.getElementById('fTen').value = u.ten;
        document.getElementById('fNgay').value = u.ngaySinh;
        document.getElementById('fNghe').value = u.ngheNghiep;
        document.getElementById('fTruong').value = u.truong;
        document.getElementById('fThich').value = u.soThich;
        document.getElementById('fBietDanh').value = u.bietDanh;
        document.getElementById('userModal').classList.remove('hidden');
    }

    function saveUser() {
        const obj = {
            ten: document.getElementById('fTen').value,
            ngaySinh: document.getElementById('fNgay').value,
            truong: document.getElementById('fTruong').value,
            ngheNghiep: document.getElementById('fNghe').value,
            soThich: document.getElementById('fThich').value,
            bietDanh: document.getElementById('fBietDanh').value
        };
        if(editIdx === -1) userData.push(obj); else userData[editIdx] = obj;
        closeModal(); render();
    }

    function handleDel(i) { if(confirm("Xóa người này?")) { userData.splice(i, 1); render(); } }
    function closeModal() { document.getElementById('userModal').classList.add('hidden'); }
    function clearForm() { document.querySelectorAll('.modal-content input').forEach(i => i.value = ''); }

    async function pushGit() {
        const token = localStorage.getItem('gh_token');
        const repo = localStorage.getItem('gh_repo');
        const status = document.getElementById('statusMsg');
        if(!token || !repo) return alert("Vui lòng nhập Token và Repo!");

        status.style.display = "block"; status.innerText = "⏳ Robot đang làm việc...";
        const finalCode = `const userData = ${JSON.stringify(userData, null, 4)};`;

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/dispatches`, {
                method: "POST",
                headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github.v3+json" },
                body: JSON.stringify({ event_type: "update-data", client_payload: { new_content: finalCode } })
            });
            if(res.ok) { status.innerText = "✅ Đã gửi lệnh thành công! Đợi 30s để GitHub cập nhật."; } 
            else { alert("Lỗi: Token sai hoặc không có quyền!"); }
        } catch(e) { alert("Lỗi kết nối!"); }
    }
</script>
</body>
</html>
